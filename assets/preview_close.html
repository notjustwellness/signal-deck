<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>signal — close preview</title>
<style>
  html,body{margin:0;height:100%;background:#0a0706;color:#D8CCC1;font-family:-apple-system,sans-serif;}
  .stage{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:34px;}
  .markwrap{position:relative;width:520px;height:116px;}
  .markwrap img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;opacity:0;}
  .tag{font-size:13px;letter-spacing:2px;opacity:0;}
  /* the SNAP — ghosts sit offset + dim, then hard-lock to one on the gun */
  .fire .ghostA{animation:snapA .18s steps(3,end) forwards;}
  .fire .ghostB{animation:snapB .18s steps(3,end) forwards;}
  .fire .tag{animation:tagin .25s ease .18s forwards;}
  @keyframes snapA{from{transform:translateX(-26px);opacity:.5;}to{transform:translateX(0);opacity:1;}}
  @keyframes snapB{from{transform:translateX(26px);opacity:.5;}to{transform:translateX(0);opacity:1;}}
  @keyframes tagin{to{opacity:.85;}}
  .controls{position:fixed;bottom:26px;left:0;right:0;text-align:center;display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
  button{background:#AD4236;color:#F6EFEA;border:none;border-radius:6px;padding:11px 22px;font-size:12px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;font-family:inherit;}
  button.alt{background:#3a2c25;color:#D8CCC1;}
  button:hover{filter:brightness(1.12);}
  .hint{position:fixed;bottom:78px;left:0;right:0;text-align:center;font-size:11px;opacity:.4;letter-spacing:1px;}
</style>
</head>
<body>
  <div class="stage" id="stage">
    <div class="markwrap">
      <img class="ghostA" src="signal_wordmark_on_dark.png" alt="">
      <img class="ghostB" src="signal_wordmark_on_dark.png" alt="">
    </div>
    <div class="tag">send the right signal</div>
  </div>
  <div class="hint" id="hint">the coil never releases — the only resolution is the gun</div>
  <div class="controls">
    <button onclick="fireGun()">▶ The gun (snap + release)</button>
    <button class="alt" onclick="playBed()">tension bed (12s)</button>
    <button class="alt" onclick="playFull()">full: coil → deny → gun</button>
  </div>
  <audio id="gun" src="signal_sound.wav" preload="auto"></audio>
  <audio id="bed" src="signal_tension_bed.wav" preload="auto"></audio>
<script>
  var stage=document.getElementById('stage'), hint=document.getElementById('hint');
  var gun=document.getElementById('gun'), bed=document.getElementById('bed');
  function resetMark(){ stage.classList.remove('fire'); void stage.offsetWidth; }
  function fireGun(){ resetMark(); gun.currentTime=0; gun.play(); stage.classList.add('fire'); }
  function playBed(){ bed.currentTime=0; bed.play(); hint.textContent='listen for the beat that needs to resolve — and won’t'; }
  function playFull(){
    resetMark(); hint.textContent='the coil tightens…';
    bed.currentTime=0; bed.play();
    setTimeout(function(){ bed.pause(); hint.textContent='— denied —'; }, 11200);     // cut bed dead
    setTimeout(function(){ hint.textContent=''; fireGun(); }, 12000);                  // ~0.8s silence, then the gun
  }
</script>
</body>
</html>
