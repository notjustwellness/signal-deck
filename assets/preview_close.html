<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>signal — meditation close preview</title>
<style>
  html,body{margin:0;height:100%;background:#0a0706;color:#D8CCC1;font-family:-apple-system,sans-serif;}
  .stage{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:34px;}
  .markwrap{position:relative;width:520px;height:116px;}
  .markwrap img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;opacity:0;}
  .tag{font-size:13px;letter-spacing:2px;opacity:0;}
  /* the slow DRIFT — ghosts ease gently into one over ~6s (not a snap) */
  .drift .ghostA{animation:driftA 6s cubic-bezier(.4,0,.2,1) forwards;}
  .drift .ghostB{animation:driftB 6s cubic-bezier(.4,0,.2,1) forwards;}
  .drift .tag{animation:tagin 2.5s ease 4.5s forwards;}
  @keyframes driftA{from{transform:translateX(-22px);opacity:.45;}to{transform:translateX(0);opacity:1;}}
  @keyframes driftB{from{transform:translateX(22px);opacity:.45;}to{transform:translateX(0);opacity:1;}}
  @keyframes tagin{to{opacity:.85;}}
  .controls{position:fixed;bottom:26px;left:0;right:0;text-align:center;display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
  button{background:#AD4236;color:#F6EFEA;border:none;border-radius:6px;padding:11px 22px;font-size:12px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;font-family:inherit;}
  button.alt{background:#3a2c25;color:#D8CCC1;}
  button:hover{filter:brightness(1.12);}
  .hint{position:fixed;bottom:78px;left:0;right:0;text-align:center;font-size:11px;opacity:.4;letter-spacing:1px;}
</style>
</head>
<body>
  <div class="stage" id="stage">
    <div class="markwrap">
      <img class="ghostA" src="signal_wordmark_on_dark.png" alt="">
      <img class="ghostB" src="signal_wordmark_on_dark.png" alt="">
    </div>
    <div class="tag">send the right signal</div>
  </div>
  <div class="hint" id="hint">two tones drift toward one across the film — the convergence is the recognition</div>
  <div class="controls">
    <button onclick="playArrival()">▶ The arrival (last ~8s + drift)</button>
    <button class="alt" onclick="playFull()">full meditation (60s)</button>
    <button class="alt" onclick="stopAll()">stop</button>
  </div>
  <audio id="snd" src="signal_meditation.wav" preload="auto"></audio>
<script>
  var stage=document.getElementById('stage'), hint=document.getElementById('hint'), snd=document.getElementById('snd');
  function drift(){ stage.classList.remove('drift'); void stage.offsetWidth; stage.classList.add('drift'); }
  function playArrival(){ // jump near the end so you hear the tones settle as the mark drifts to one
    snd.currentTime = Math.max(0, (snd.duration || 60) - 8);
    snd.play(); hint.textContent='listen: the beat slows to stillness as the mark resolves'; drift();
  }
  function playFull(){
    snd.currentTime = 0; snd.play(); hint.textContent='the slow drift to unison — give it the full minute';
    var when = ((snd.duration || 60) - 6) * 1000;
    clearTimeout(window._t); window._t = setTimeout(drift, when);   // drift the mark in the final ~6s
  }
  function stopAll(){ snd.pause(); clearTimeout(window._t); }
</script>
</body>
</html>
